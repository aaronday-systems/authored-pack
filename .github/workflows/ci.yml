name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run pytest
        run: pytest -q
      - name: CLI help smoke
        run: python3 -m authored_pack --help
      - name: TUI PTY smoke
        run: python3 scripts/smoke_tui_pty.py
      - name: Installed CLI smoke
        run: bash scripts/smoke_install.sh
      - name: Demo smoke
        run: bash scripts/demo_v1.sh
